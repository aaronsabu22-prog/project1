<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Research Paper Assistant</title>

    <link rel="stylesheet" href="/static/style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>AI Research Paper Assistant</h1>

        <p class="subtitle">
            Analyze your research project and predict its category using Artificial Intelligence.
        </p>

        <div class="card">

            <textarea
                id="projectDescription"
                placeholder="Enter your research project description here..."></textarea>

            <button onclick="predictCategory()">
                Predict Category
            </button>

        </div>

        <div id="result" class="result">

            Prediction will appear here...

        </div>

    </div>

<script src="/static/script.js"></script>

</body>
</html>
