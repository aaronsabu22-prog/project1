<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>AI Research Paper Assistant</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet"
          href="/static/style.css">

</head>

<body>

<div class="container">

    <header>

        <h1>AI Research Paper Assistant</h1>

        <p>
            Upload research papers, generate summaries,
            and ask questions using AI.
        </p>

    </header>

    <section class="upload-card">

        <h2>Upload Research Paper</h2>

        <input
            type="file"
            id="pdfFile"
            accept=".pdf">

        <button id="uploadBtn">

            Upload Paper

        </button>

    </section>

    <section class="summary-card">

        <div class="card-header">

            <h2>Research Summary</h2>

            <button id="summaryBtn">

                Generate Summary

            </button>

        </div>

        <div
            id="summary"
            class="output-box">

            Summary will appear here.

        </div>

    </section>

    <section class="question-card">

        <h2>Ask Questions</h2>

        <input
            type="text"
            id="question"
            placeholder="Ask anything about the uploaded paper">

        <button id="askBtn">

            Ask AI

        </button>

        <div
            id="answer"
            class="output-box">

            AI answer will appear here.

        </div>

    </section>

    <section class="search-card">

        <h2>Semantic Search</h2>

        <input
            type="text"
            id="searchQuery"
            placeholder="Search concepts inside paper">

        <button id="searchBtn">

            Search

        </button>

        <div
            id="searchResults"
            class="output-box">

            Search results will appear here.

        </div>

    </section>

    <section class="footer-card">

        <button id="clearBtn">

            Clear Uploaded Paper

        </button>

    </section>

</div>

<script src="/static/script.js"></script>

</body>

</html>
